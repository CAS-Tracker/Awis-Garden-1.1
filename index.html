<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awis' Garden - Professional Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #fbbf24;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #game-container {
            position: relative;
            border: 8px solid #334155;
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        canvas {
            image-rendering: pixelated;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-card {
            background: rgba(15, 23, 42, 0.8);
            border-left: 4px solid var(--accent);
            padding: 10px 20px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }
        .clock-container {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }
        #time-display { font-size: 24px; font-weight: bold; }
        #phase-display { font-size: 14px; text-transform: uppercase; color: var(--accent); }
        .inventory-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div class="hud-card clock-container">
            <div id="time-display">00:00</div>
            <div id="phase-display">Día</div>
        </div>
        <div class="hud-card inventory-card">
            <div>🎒 INVENTARIO</div>
            <div style="font-size: 20px;">🌱 Semillas: <span id="seed-count">0</span></div>
        </div>
    </div>
</div>

<script>
/**
 * AWIS' GARDEN - SISTEMA DE SEMILLAS Y RELOJ AVANZADO
 */

const CONFIG = {
    TILE_SIZE: 32,
    MAP_COLS: 25,
    MAP_ROWS: 18,
    SCALE: 1.5,
    MINUTES_PER_DAY: 20, // 10 min día / 10 min noche
    SEED_SPAWN_RATE: 0.005, // Probabilidad por frame de que aparezca una semilla
    MAX_SEEDS_ON_GROUND: 10
};

const TextureGenerator = {
    generate() {
        const c = document.createElement('canvas');
        c.width = 256; c.height = 256;
        const ctx = c.getContext('2d');

        // Pasto
        ctx.fillStyle = '#2d6a4f';
        ctx.fillRect(0, 0, 32, 32);
        ctx.fillStyle = '#1b4332';
        ctx.fillRect(5, 5, 2, 2);

        // Tierra Maceta
        ctx.fillStyle = '#582f0e';
        ctx.fillRect(32, 0, 32, 32);
        ctx.strokeStyle = '#331800';
        ctx.strokeRect(34, 2, 28, 28);

        // Semilla en el suelo
        ctx.fillStyle = '#fde047'; // Amarillo brillante para que sea visible
        ctx.beginPath();
        ctx.arc(80, 16, 4, 0, Math.PI * 2);
        ctx.fill();

        // Jugadora (Mujer - Estilo Retro)
        ctx.fillStyle = '#ffb703'; // Cabello
        ctx.fillRect(128, 2, 16, 8);
        ctx.fillStyle = '#ffdbac'; // Piel
        ctx.fillRect(128, 10, 16, 10);
        ctx.fillStyle = '#e91e63'; // Vestido
        ctx.fillRect(128, 20, 16, 12);

        // Planta Creciendo
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(160, 10, 6, 22); // Tallo

        return c;
    }
};

class Collectible {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 20;
        this.height = 20;
    }
}

class Pot {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.hasSeed = false;
        this.growth = 0;
        this.plantedAt = 0;
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.tileset = TextureGenerator.generate();
        
        this.player = { x: 100, y: 100, seeds: 0, speed: 3 };
        this.seedsOnGround = [];
        this.pots = [];
        this.keys = {};
        this.worldTime = 0; // ms

        this.init();
    }

    init() {
        this.canvas.width = CONFIG.MAP_COLS * CONFIG.TILE_SIZE;
        this.canvas.height = CONFIG.MAP_ROWS * CONFIG.TILE_SIZE;
        
        // Crear jardín inicial
        for(let i=0; i<5; i++) {
            this.pots.push(new Pot(200 + i*50, 250));
        }

        window.addEventListener('keydown', e => {
            this.keys[e.key.toLowerCase()] = true;
            if(e.key.toLowerCase() === 'e') this.tryPickup();
            if(e.key.toLowerCase() === ' ') this.tryPlant();
        });
        window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
        
        this.loop();
    }

    tryPickup() {
        this.seedsOnGround = this.seedsOnGround.filter(s => {
            const dist = Math.hypot(this.player.x - s.x, this.player.y - s.y);
            if(dist < 30) {
                this.player.seeds++;
                return false;
            }
            return true;
        });
    }

    tryPlant() {
        if(this.player.seeds <= 0) return;
        
        for(let p of this.pots) {
            const dist = Math.hypot(this.player.x - p.x, this.player.y - p.y);
            if(dist < 40 && !p.hasSeed) {
                p.hasSeed = true;
                p.plantedAt = this.worldTime;
                this.player.seeds--;
                break;
            }
        }
    }

    spawnSeeds() {
        if(this.seedsOnGround.length < CONFIG.MAX_SEEDS_ON_GROUND) {
            if(Math.random() < CONFIG.SEED_SPAWN_RATE) {
                this.seedsOnGround.push(new Collectible(
                    Math.random() * (this.canvas.width - 32),
                    Math.random() * (this.canvas.height - 32)
                ));
            }
        }
    }

    update(dt) {
        this.worldTime += dt;
        
        // Movimiento
        if(this.keys['w']) this.player.y -= this.player.speed;
        if(this.keys['s']) this.player.y += this.player.speed;
        if(this.keys['a']) this.player.x -= this.player.speed;
        if(this.keys['d']) this.player.x += this.player.speed;

        this.spawnSeeds();
        this.updateUI();
    }

    updateUI() {
        const dayMS = CONFIG.MINUTES_PER_DAY * 60 * 1000;
        const currentCycle = this.worldTime % dayMS;
        const hour = Math.floor((currentCycle / dayMS) * 24);
        const minute = Math.floor(((currentCycle / dayMS) * 1440) % 60);
        const isNight = hour >= 12; // 12 horas día, 12 horas noche (basado en los 20 min)

        document.getElementById('time-display').innerText = 
            `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
        document.getElementById('phase-display').innerText = isNight ? "🌙 Noche" : "☀️ Día";
        document.getElementById('seed-count').innerText = this.player.seeds;

        this.isNight = isNight;
    }

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0,0, this.canvas.width, this.canvas.height);

        // Dibujar pasto
        for(let i=0; i<CONFIG.MAP_COLS; i++) {
            for(let j=0; j<CONFIG.MAP_ROWS; j++) {
                ctx.drawImage(this.tileset, 0, 0, 32, 32, i*32, j*32, 32, 32);
            }
        }

        // Semillas en suelo
        this.seedsOnGround.forEach(s => {
            ctx.drawImage(this.tileset, 64, 0, 32, 32, s.x, s.y, 32, 32);
        });

        // Macetas
        this.pots.forEach(p => {
            ctx.drawImage(this.tileset, 32, 0, 32, 32, p.x, p.y, 32, 32);
            if(p.hasSeed) {
                ctx.drawImage(this.tileset, 160, 0, 32, 32, p.x, p.y - 10, 32, 32);
            }
        });

        // Jugadora
        ctx.drawImage(this.tileset, 128, 0, 32, 32, this.player.x, this.player.y, 32, 32);

        // Filtro Noche
        if(this.isNight) {
            ctx.fillStyle = "rgba(15, 23, 42, 0.6)";
            ctx.fillRect(0,0, this.canvas.width, this.canvas.height);
        }
    }

    loop(timestamp) {
        if(!this.lastTime) this.lastTime = timestamp;
        const dt = timestamp - this.lastTime;
        this.lastTime = timestamp;

        this.update(dt);
        this.draw();
        requestAnimationFrame(t => this.loop(t));
    }
}

new Game();
</script>
</body>
</html>
